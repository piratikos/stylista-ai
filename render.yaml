services:
  - type: web
    name: dr-style
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install && npx next build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
